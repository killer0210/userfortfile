    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-main: #f8f8f8;
            --bg-dark: #111111;
            --text-main: #1a1a1a;
            --text-soft: #6b6b6b;
            --border-soft: #e5e5e5;
            --color-white: #ffffff;
            --color-black: #000000;
            /* Corner decoration – нэг газар өөрчлөхөд бүх буланд нөлөөлнө */
            --corner-size: 2.5rem;
            --corner-gap: 0.15rem;
            --corner-shadow: 1rem;
        }

        @media (min-width: 768px) {
            :root {
                --corner-size: 4rem;
            }
        }

        /* .concave {
            background: black;

            -webkit-mask:

            -webkit-mask-position: 0 0, 0 0;
            -webkit-mask-repeat: no-repeat;
            -webkit-mask-composite: source-in;

            mask:
                radial-gradient(circle at bottom left, transparent 40px, black 41px),
                radial-gradient(circle at top right, transparent 40px, black 41px);
            mask-size: 100% 100%;
            mask-position: 0 0, 0 0;
            mask-repeat: no-repeat;
            mask-composite: intersect;
        } */

        .title {
            position: relative;
        }

        .title::after,
        .title::before {
            content: '';
            position: absolute;
            width: var(--corner-size);
            height: var(--corner-size);
            background-color: transparent;
            border-radius: 60% 0 0 0;
            box-shadow: calc(-1 * var(--corner-shadow)) calc(-1 * var(--corner-shadow)) var(--bg-dark);
            backface-visibility: hidden;
        }

        .title::after {
            bottom: calc(-1 * var(--corner-size));
            left: calc(-1 * var(--corner-gap));
        }

        .title::before {
            top: calc(-1 * var(--corner-gap));
            right: calc(-1 * var(--corner-size));
        }

        .links {
            position: relative;
        }

        .links::after,
        .links::before {
            content: '';
            position: absolute;
            width: var(--corner-size);
            height: var(--corner-size);
            background-color: transparent;
            border-radius: 0 0 60% 0;
            box-shadow: var(--corner-shadow) var(--corner-shadow) var(--bg-dark);
            backface-visibility: hidden;
        }

        .links::after {
            bottom: calc(-1 * var(--corner-gap));
            left: calc(-1 * var(--corner-size));
        }

        .links::before {
            top: calc(-1 * var(--corner-size));
            right: calc(-1 * var(--corner-gap));
        }

        main>div {
            background-image:
                url('./profile-removebg-preview.png'),
                radial-gradient(circle at 70% 50%, #ffe7c2, transparent 60%);
            background-size: contain, cover;
            background-position: center, center;
            background-repeat: no-repeat, no-repeat;
        }
    </style>
</head>
